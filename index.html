<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>Todo Card</title>
        <link rel="stylesheet" href="styles.css">
        <script defer src="app.js"></script>
    </head>
    <body>
        <article data-testid="test-todo-card">
        
            <h2 class="task-title" data-testid="test-todo-title">HNG Stage 0</h2>
            <p class="description" data-testid="test-todo-description">Create a testable todo card.Complete the task and make sure it is responsive. Do well to style it properly. Read through to understand what is to be done</p>
            <span class="priority" data-testid="test-todo-priority"> Priority: High ⚠️</span>
            <span class="status" data-testid="test-todo-status" aria-label="status"> In Progress</span>
            <div class="times">
            <time data-testid="test-todo-due-date">Due Date 16 April 2026</time>
            <time data-testid="test-todo-time-remaining">Due in <span class="time"></span></time>
            </div>
            <ul role="list" data-testid="test-todo-tags">
                <li data-testid="test-todo-tag-work">Work</li>
                <li data-testid="test-todo-tag-urgent">Urgent</li>
                <li data-testid="test-todo-tag-fast">Fast</li>
            </ul>
            <input type="checkbox" id="check" data-testid="test-todo-complete-toggle"/> 
            <label for="check">Mark ✅ as completed</label>
            
            <div>
            <button class="editbtn" data-testid="test-todo-edit-button">Edit Todo 📝
            </button>
            <button class="deletebtn" data-testid="test-todo-delete-button">Delete Todo 🗑️
            </button>
            </div>
            
        </article>
    </body>

</html>
